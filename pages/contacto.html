<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="¿Querés potenciar tu marca? Contactá a Meraki y empecemos a trabajar tu estrategia de redes, contenido y branding de forma personalizada.">

    <title>Contacto | MERAKI</title>

    <!-- link css bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- link css donde compila sass -->
    <link rel="stylesheet" href="../css/estilos.css">


</head>

<body>
    <header>
        <!-- logo -->
        <a href="../index.html"> <img class="logo" src="../img/logo.png" ; alt="logo meraki"></a>


        <!-- menu de navegacion-->
        <nav>
            <!-- Zona navegable -->
            <ul>
                <li><a href="../index.html">HOME</a></li>
                <li><a href="./proyectosreales.html">PROYECTOS</a></li>
                <li><a href="#">CONTACTO</a></li>
            </ul>

        </nav>
    </header>

    <main>
        <h1>¿CREAMOS ALGO JUNTOS?</h1>



        <section class="mb-3">
            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="email" placeholder="nombre@xxx.com">


            <div class="mb-3">
                <label for="mensaje" class="form-label"> Mensaje</label>
                <textarea class="form-control" id="mensaje" rows="4"></textarea>

                <button type="submit" class="btn btn-primary w-100">
                    Enviar mensaje
                </button>

            </div>
        </section>

        <section class="iconos-contacto">
            <div class="mail">
                <p>Email: contacto@meraki.com</p>
                <img class="icono" src="../img/correo.png" alt="icono correo">
            </div>
            <div class="wp">
                <p>WhatsApp: +XX XXX XXX</p>
                <img class="icono" src="../img/whatsapp.jpg" alt="icono whatsapp">
            </div>

        </section>

    </main>

    <footer>
        <p>SEGUINOS EN REDES</p>
        <img class="instagram" src="../img/ig.png" alt="logo instagram">

    </footer>

    <!-- js de bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
